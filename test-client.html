<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location Backend Test Client</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e4e4e7; padding: 24px; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #71717a; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 900px; }
    .card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 20px; }
    .card h2 { font-size: 14px; color: #a1a1aa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: #71717a; margin-bottom: 4px; margin-top: 10px; }
    input { width: 100%; padding: 8px 10px; background: #0a0a0a; border: 1px solid #3f3f46; border-radius: 6px; color: #e4e4e7; font-size: 13px; font-family: monospace; }
    input:focus { outline: none; border-color: #22c55e; }
    button { margin-top: 14px; width: 100%; padding: 9px; background: #22c55e; color: #000; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    button:hover { background: #16a34a; }
    button.blue { background: #3b82f6; color: #fff; }
    button.blue:hover { background: #2563eb; }
    .response { margin-top: 12px; padding: 10px; background: #0a0a0a; border: 1px solid #27272a; border-radius: 6px; font-family: monospace; font-size: 12px; color: #a1a1aa; min-height: 48px; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; }
    .log-area { grid-column: 1 / -1; }
    .log-area .response { min-height: 120px; max-height: 300px; }
    .status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; margin-bottom: 14px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e80; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #eab308; }
  </style>
</head>
<body>

  <h1>Location Backend — Test Client</h1>
  <p class="subtitle">Hit all endpoints and watch Socket.io events in real time</p>

  <div class="grid">

    <!-- POST /:id/ping -->
    <div class="card">
      <h2>POST /:id/ping</h2>
      <label>User ID</label>
      <input type="text" id="ping-userId" value="user_4ic9h4" />
      <label>Latitude</label>
      <input type="number" id="ping-lat" value="26.1445" step="0.0001" />
      <label>Longitude</label>
      <input type="number" id="ping-lng" value="91.7362" step="0.0001" />
      <button onclick="sendPing()">Send Ping</button>
      <div class="response" id="ping-res">Waiting...</div>
    </div>

    <!-- GET /user/:id -->
    <div class="card">
      <h2>GET /user/:id</h2>
      <label>User ID</label>
      <input type="text" id="get-userId" value="user_4ic9h4" />
      <button class="blue" onclick="getUser()">Fetch Location</button>
      <div class="response" id="get-res">Waiting...</div>

      <h2 style="margin-top: 20px;">GET /users/active</h2>
      <button class="blue" onclick="getActive()">Fetch Active Users</button>
      <div class="response" id="active-res">Waiting...</div>
    </div>

    <!-- Socket.io live log -->
    <div class="card log-area">
      <h2>Socket.io — Live Events</h2>
      <div class="status">
        <span class="dot" id="socket-dot"></span>
        <span id="socket-status">Connecting...</span>
      </div>
      <div class="response" id="socket-log">Waiting for locationUpdate events...\n</div>
    </div>

  </div>

  <script>
    const BASE = "http://localhost:9001";

    // ── Socket.io ─────────────────────────────────────────────
    const socket = io(BASE, { transports: ["websocket", "polling"] });
    const dot = document.getElementById("socket-dot");
    const statusEl = document.getElementById("socket-status");
    const logEl = document.getElementById("socket-log");

    socket.on("connect", () => {
      dot.className = "dot green";
      statusEl.textContent = "Connected (id: " + socket.id + ")";
    });

    socket.on("disconnect", (reason) => {
      dot.className = "dot red";
      statusEl.textContent = "Disconnected — " + reason;
    });

    socket.on("connect_error", () => {
      dot.className = "dot yellow";
      statusEl.textContent = "Connection error — retrying...";
    });

    socket.on("locationUpdate", (data) => {
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `[${time}] userId=${data.userId}  lat=${data.lat}  lng=${data.lng}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    });

    // ── POST /:id/ping ────────────────────────────────────────
    async function sendPing() {
      const userId = document.getElementById("ping-userId").value.trim();
      const lat = parseFloat(document.getElementById("ping-lat").value);
      const lng = parseFloat(document.getElementById("ping-lng").value);
      const el = document.getElementById("ping-res");

      try {
        const res = await fetch(`${BASE}/${userId}/ping`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ lat, lng }),
        });
        const json = await res.json();
        el.textContent = JSON.stringify(json, null, 2);
      } catch (err) {
        el.textContent = "Error: " + err.message;
      }
    }

    // ── GET /user/:id ─────────────────────────────────────────
    async function getUser() {
      const userId = document.getElementById("get-userId").value.trim();
      const el = document.getElementById("get-res");

      try {
        const res = await fetch(`${BASE}/user/${userId}`);
        const json = await res.json();
        el.textContent = JSON.stringify(json, null, 2);
      } catch (err) {
        el.textContent = "Error: " + err.message;
      }
    }

    // ── GET /users/active ─────────────────────────────────────
    async function getActive() {
      const el = document.getElementById("active-res");

      try {
        const res = await fetch(`${BASE}/users/active`);
        const json = await res.json();
        el.textContent = JSON.stringify(json, null, 2);
      } catch (err) {
        el.textContent = "Error: " + err.message;
      }
    }
  </script>

</body>
</html>
